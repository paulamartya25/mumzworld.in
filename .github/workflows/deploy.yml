name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with Pylint (Optional)
      run: |
        pip install pylint
        pylint app.py --disable=all --enable=E,F || true
    
    - name: Check syntax
      run: |
        python -m py_compile app.py

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Streamlit Cloud
      uses: streamlit/streamlit-app-action@v0.0.11
      with:
        app-path: app.py
        streamlit-url: https://share.streamlit.io
        # Note: You need to set STREAMLIT_CLOUD_API_TOKEN as a secret in GitHub
